<!DOCTYPE html>
<html>
<head>
    <title>Hotbeans Web - Apply</title>

    <!-- MOBILE FRIENDLY -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
        }

        /* LOGO AREA */
        .logo-area {
            background: #ffffff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }

        .logo-area img {
            width: 200px;
            height: auto;
        }

        /* NAVIGATION */
        .nav {
            background: #ff3c00;
            padding: 12px;
            text-align: center;
        }

        .nav a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            padding: 0 12px;
            border-right: 2px solid white;
        }

        /* Remove last line */
        .nav a:last-child {
            border-right: none;
        }

        /* HERO */
        .hero {
            padding: 50px;
            background: #ffe2d4;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }

        .hero h1 {
            margin: 0;
            font-size: 34px;
            color: #ff3c00;
        }

        .hero p {
            margin-top: 10px;
            font-size: 17px;
            color: #333;
        }

        /* FORM SECTION */
        .section {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .box {
            background: #ffffff;
            padding: 15px;
            border: 1px solid #ddd;
        }

        .box h3 {
            margin-top: 0;
            color: #ff3c00;
        }

        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            background: #ff3c00;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #e03800;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            background: #d4ffd8;
            border: 1px solid #8cd994;
            color: #2b6a2d;
            font-weight: bold;
            display: none;
        }

        /* FOOTER */
        .footer {
            background: #222;
            color: #FFFFFF;
            padding: 15px;
            text-align: center;
            margin-top: 30px;
            font-size: 15px;
            border-top: 4px solid #ff3c00;
        }

        /* ----------------------------- */
        /* MOBILE FRIENDLY ADJUSTMENTS   */
        /* ----------------------------- */
        @media (max-width: 768px) {

            .hero {
                padding: 30px;
            }

            .hero h1 {
                font-size: 26px;
            }

            .hero p {
                font-size: 15px;
            }

            .nav a {
                display: inline-block;
                margin: 6px 4px;
                border-right: none;
                border-bottom: 1px solid white;
                padding-bottom: 6px;
            }

            .nav a:last-child {
                border-bottom: none;
            }
        }

        @media (max-width: 480px) {

            .hero h1 {
                font-size: 22px;
            }

            .hero p {
                font-size: 14px;
            }

            .nav a {
                display: block;
                margin: 10px 0;
                border-bottom: 1px solid white;
            }

            .nav a:last-child {
                border-bottom: none;
            }

            .logo-area img {
                width: 150px;
            }
        }
    </style>

    <script>
        function validateForm() {
            const name = document.querySelector('input[type="text"]').value.trim();
            const email = document.querySelector('input[type="email"]').value.trim();
            const reason = document.querySelector('textarea').value.trim();

            // Check if fields are empty
            if (!name || !email || !reason) {
                alert('Please fill out all fields before submitting.');
                return false;
            }

            // Check if email contains @
            if (!email.includes("@")) {
                alert('Please enter a valid email address with an "@" symbol.');
                return false;
            }

            // Check if email ends with .com or .co.uk
            if (!(email.endsWith(".com") || email.endsWith(".co.uk"))) {
                alert('Please enter a valid email ending with ".com" or ".co.uk".');
                return false;
            }

            showMessage();
        }

        function showMessage() {
            document.getElementById("confirmMessage").style.display = "block";
        }
    </script>
</head>
<body>

    <!-- LOGO AREA -->
    <div class="logo-area">
        <img src="images/hotbeanslogo2.png" alt="Hotbeans Web Logo">
    </div>

    <!-- NAVIGATION -->
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="company.html">Company</a>
        <a href="trainers.html">Trainers</a>
        <a href="course.html">Course</a>
        <a href="apply.html">Apply</a>
        <a href="help.html">Help</a>
    </div>

    <!-- HERO SECTION -->
    <div class="hero">
        <h1>Apply Here</h1>
        <p>Fill out the application form below to begin your journey with Hotbeans Web.</p>
    </div>

    <!-- FORM SECTION -->
    <div class="section">
        <div class="box">
            <h3>Application Form</h3>

            <form>

                <label>Full Name</label>
                <input type="text" placeholder="Enter your name">

                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">

                <label>Why do you want to join?</label>
                <textarea rows="4" placeholder="Write a short explanation..."></textarea>

            </form>

            <button onclick="validateForm()">Submit Application</button>

            <div id="confirmMessage" class="message">
                Your application has been submitted. We will get back to you soon!
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        © 2026 Hotbeans Web — Learning Made Simple
    </div>

</body>
</html>
